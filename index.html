<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Game Time Bank</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: #f4f3ff; min-height: 100vh; }
    #app { margin: 0 auto; }
    .sync-status { position: fixed; bottom: 12px; right: 12px; font-size: 11px; font-weight: 800; padding: 5px 10px; border-radius: 999px; z-index: 999; transition: all 0.3s; }
    .sync-status.ok { background: #dcfce7; color: #166534; }
    .sync-status.syncing { background: #fef9c3; color: #854d0e; }
    .sync-status.err { background: #fee2e2; color: #991b1b; }
    .bonus-applied { display: none; background: #f0fdf4; border: 2px solid #86efac; border-radius: 16px; padding: 12px 16px; margin-bottom: 14px; text-align: center; font-weight: 800; color: #166534; animation: fadeIn 0.4s ease; }
    .bonus-applied.show { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

    /* カード共通 */
    .kid-card { border-radius: 24px; position: relative; overflow: hidden; box-shadow: 0 6px 28px rgba(0,0,0,0.14); }
    .kid-card.yuwa { background: linear-gradient(135deg, #667eea, #764ba2); }
    .kid-card.yuuki { background: linear-gradient(135deg, #f7971e, #fd7c07); }
    .card-bg-icon { position: absolute; right: -10px; top: -10px; opacity: 0.1; pointer-events: none; }
    .kid-name { font-weight: 900; color: rgba(255,255,255,0.9); }
    .kid-multiplier { font-weight: 700; color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.18); display: inline-block; border-radius: 20px; }

    /* 時間＋お小遣い表示エリア */
    .kid-stats { display: flex; align-items: flex-end; gap: 0; }
    .stat-block { flex: 1; }
    .stat-label { font-size: 11px; font-weight: 800; color: rgba(255,255,255,0.6); margin-bottom: 2px; }
    .kid-time { font-weight: 900; color: #fff; line-height: 1; letter-spacing: -2px; }
    .kid-time-unit { font-weight: 700; color: rgba(255,255,255,0.8); }
    .stat-divider { width: 1px; background: rgba(255,255,255,0.25); align-self: stretch; margin: 0 12px; }
    .kid-money { font-weight: 900; color: #fff; line-height: 1; letter-spacing: -2px; }
    .kid-money-unit { font-weight: 700; color: rgba(255,255,255,0.8); }

    /* お小遣い変換ボタン */
    .convert-btn { border: none; border-radius: 10px; font-family: 'Nunito', sans-serif; font-weight: 900; cursor: pointer; transition: transform 0.1s; background: rgba(255,255,255,0.22); color: #fff; white-space: nowrap; }
    .convert-btn:active { transform: scale(0.93); }
    .convert-btn:hover { background: rgba(255,255,255,0.32); }

    /* お小遣い変換ピッカー */
    .convert-area { margin-top: 10px; }
    .convert-toggle-btn { border: none; border-radius: 10px; font-family: 'Nunito', sans-serif; font-weight: 900; cursor: pointer; transition: all 0.15s; background: rgba(255,255,255,0.22); color: #fff; white-space: nowrap; width: 100%; }
    .convert-toggle-btn:hover { background: rgba(255,255,255,0.32); }
    .convert-toggle-btn.active { background: rgba(255,215,0,0.35); color: #fff; }
    .convert-picker { display: none; margin-top: 8px; }
    .convert-picker.visible { display: flex; align-items: flex-end; gap: 8px; }
    .convert-drum-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .convert-drum-label { font-size: 12px; font-weight: 800; color: rgba(255,255,255,0.6); }
    .convert-drum-scroll { width: 100%; overflow-y: scroll; border-radius: 12px; scroll-snap-type: y mandatory; scrollbar-width: none; background: rgba(255,255,255,0.15); }
    .convert-drum-scroll::-webkit-scrollbar { display: none; }
    .convert-drum-sep { font-weight: 900; color: rgba(255,255,255,0.8); }
    .convert-confirm-btn { border: none; border-radius: 12px; font-family: 'Nunito', sans-serif; font-weight: 900; cursor: pointer; transition: transform 0.1s; white-space: nowrap; background: rgba(255,215,0,0.5); color: #fff; }
    .convert-confirm-btn:active { transform: scale(0.91); }
    /* アクションタブ */
    .tab-btn { flex: 1; border: none; border-radius: 14px; font-family: 'Nunito', sans-serif; font-weight: 900; cursor: pointer; transition: all 0.15s; }
    .add-tab { background: rgba(255,255,255,0.22); color: #fff; }
    .use-tab { background: rgba(0,0,0,0.22); color: #fff; }
    .add-tab.active { background: #fff; color: #764ba2; }
    .use-tab.active { background: rgba(0,0,0,0.52); color: #fff; }
    .mins-picker { display: none; gap: 8px; }
    .mins-picker.visible { display: grid; }
    .min-btn { border: none; border-radius: 12px; font-family: 'Nunito', sans-serif; font-weight: 900; cursor: pointer; transition: transform 0.1s; width: 100%; }
    .min-btn:active { transform: scale(0.91); }
    .add-picker .min-btn { background: rgba(255,255,255,0.88); color: #444; }
    .use-picker .min-btn { background: rgba(0,0,0,0.32); color: #fff; }
    .drum-row { display: flex; align-items: flex-end; gap: 8px; margin-top: 10px; grid-column: 1 / -1; }
    .drum-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .drum-label { font-size: 12px; font-weight: 800; color: rgba(255,255,255,0.6); }
    .drum-scroll { width: 100%; overflow-y: scroll; border-radius: 12px; scroll-snap-type: y mandatory; scrollbar-width: none; background: rgba(255,255,255,0.15); }
    .drum-scroll::-webkit-scrollbar { display: none; }
    .drum-item { display: flex; align-items: center; justify-content: center; scroll-snap-align: start; font-weight: 900; color: #fff; cursor: pointer; }
    .drum-sep { font-weight: 900; color: rgba(255,255,255,0.8); }
    .drum-confirm-btn { border: none; border-radius: 12px; font-family: 'Nunito', sans-serif; font-weight: 900; cursor: pointer; transition: transform 0.1s; white-space: nowrap; }
    .drum-confirm-btn:active { transform: scale(0.91); }
    .add-picker .drum-confirm-btn { background: rgba(255,255,255,0.88); color: #444; }
    .use-picker .drum-confirm-btn { background: rgba(0,0,0,0.32); color: #fff; }

    /* ログ */
    .log-section { background: #fff; border-radius: 20px; box-shadow: 0 2px 14px rgba(0,0,0,0.07); }
    .log-title { font-weight: 900; color: #aaa; text-transform: uppercase; letter-spacing: 0.8px; }
    .log-item { display: flex; align-items: center; gap: 8px; border-bottom: 0.5px solid #f0f0f0; }
    .log-item:last-child { border-bottom: none; padding-bottom: 0; }
    .log-dot { border-radius: 50%; flex-shrink: 0; }
    .log-dot.yuwa { background: #764ba2; }
    .log-dot.yuuki { background: #fd7c07; }
    .log-dot.money { background: #f59e0b; }
    .log-text { flex: 1; color: #333; font-weight: 700; }
    .log-delta { font-weight: 900; }
    .log-delta.plus { color: #22c55e; }
    .log-delta.minus { color: #ef4444; }
    .log-delta.yen { color: #f59e0b; }
    .log-ts { color: #bbb; font-weight: 700; }
    .empty-log { text-align: center; color: #ccc; font-weight: 700; }
    .toast { position: fixed; top: 18px; left: 50%; transform: translateX(-50%) translateY(-80px); background: #2d2d4e; color: #fff; border-radius: 999px; font-weight: 800; transition: transform 0.3s ease; z-index: 999; white-space: nowrap; pointer-events: none; }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ===== ECHO SHOW (800px以上) ===== */
    @media (min-width: 800px) {
      body { padding: 20px; }
      #app { max-width: 900px; }
      .bonus-applied { font-size: 18px; margin-bottom: 16px; }
      .header { position: relative; text-align: center; padding: 20px 0 24px; }
      .header h1 { font-size: 40px; font-weight: 900; color: #2d2d4e; }
      .header p { font-size: 16px; color: #888; font-weight: 700; margin-top: 6px; }
      .reload-btn { position: absolute; top: 20px; right: 0; border: none; background: rgba(45,45,78,0.1); border-radius: 50%; width: 52px; height: 52px; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.3s ease, background 0.2s; }
      .reload-btn:hover { background: rgba(45,45,78,0.18); }
      .reload-btn:active { transform: rotate(180deg); }
      .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
      .kid-card { padding: 22px 22px 18px; }
      .card-bg-icon { font-size: 100px; }
      .kid-name { font-size: 22px; margin-bottom: 4px; }
      .kid-multiplier { font-size: 13px; padding: 3px 12px; margin-bottom: 14px; }
      .kid-stats { margin-bottom: 14px; }
      .stat-label { font-size: 11px; }
      .kid-time { font-size: 64px; }
      .kid-time-unit { font-size: 20px; margin-left: 4px; }
      .kid-money { font-size: 64px; }
      .kid-money-unit { font-size: 20px; margin-left: 4px; }
      .convert-toggle-btn { margin-top: 10px; padding: 9px 16px; font-size: 15px; }
      .convert-drum-scroll { height: 62px; }
      .convert-drum-scroll .drum-item { height: 62px; font-size: 25px; }
      .convert-drum-sep { font-size: 25px; padding-bottom: 10px; }
      .convert-confirm-btn { height: 62px; padding: 0 14px; font-size: 15px; }
      .action-area { margin-top: 14px; }
      .action-tabs { display: flex; gap: 8px; margin-bottom: 10px; }
      .tab-btn { padding: 12px 0; font-size: 18px; }
      .mins-picker { grid-template-columns: repeat(4, 1fr); }
      .min-btn { height: 54px; font-size: 17px; }
      .drum-scroll { height: 62px; }
      .drum-item { height: 62px; font-size: 25px; }
      .drum-sep { font-size: 25px; padding-bottom: 10px; }
      .drum-confirm-btn { height: 62px; padding: 0 14px; font-size: 15px; }
      .log-section { padding: 18px 20px; }
      .log-title { font-size: 13px; margin-bottom: 10px; }
      .log-item { font-size: 15px; padding: 8px 0; gap: 10px; }
      .log-dot { width: 9px; height: 9px; }
      .log-delta { font-size: 16px; }
      .log-ts { font-size: 12px; }
      .empty-log { font-size: 15px; padding: 14px 0; }
      .toast { font-size: 18px; padding: 14px 28px; }
    }

    /* ===== スマホ (799px以下) ===== */
    @media (max-width: 799px) {
      body { padding: 0; }
      #app { max-width: 100%; padding: 0; }
      .bonus-applied { font-size: 14px; margin: 10px 14px; border-radius: 12px; padding: 10px 14px; }
      .header { position: relative; text-align: center; padding: 18px 16px 14px; background: #fff; border-bottom: 1px solid #ebebeb; }
      .header h1 { font-size: 26px; font-weight: 900; color: #2d2d4e; }
      .header p { font-size: 12px; color: #888; font-weight: 700; margin-top: 4px; }
      .reload-btn { position: absolute; top: 16px; right: 16px; border: none; background: rgba(45,45,78,0.08); border-radius: 50%; width: 40px; height: 40px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.3s ease; }
      .reload-btn:active { transform: rotate(180deg); }
      .cards-grid { display: flex; flex-direction: column; gap: 0; }
      .kid-card { border-radius: 0; margin-bottom: 8px; padding: 16px 16px 14px; box-shadow: none; border-bottom: 3px solid rgba(0,0,0,0.08); }
      .card-bg-icon { font-size: 72px; }
      .kid-name { font-size: 17px; margin-bottom: 3px; }
      .kid-multiplier { font-size: 11px; padding: 2px 9px; margin-bottom: 10px; }
      .kid-stats { margin-bottom: 10px; }
      .stat-label { font-size: 10px; }
      .kid-time { font-size: 50px; }
      .kid-time-unit { font-size: 17px; margin-left: 3px; }
      .kid-money { font-size: 50px; }
      .kid-money-unit { font-size: 17px; margin-left: 3px; }
      .convert-toggle-btn { margin-top: 8px; padding: 8px 14px; font-size: 13px; }
      .convert-drum-scroll { height: 54px; }
      .convert-drum-scroll .drum-item { height: 54px; font-size: 21px; }
      .convert-drum-sep { font-size: 21px; padding-bottom: 8px; }
      .convert-confirm-btn { height: 54px; padding: 0 11px; font-size: 13px; }
      .action-area { margin-top: 12px; }
      .action-tabs { display: flex; gap: 6px; margin-bottom: 8px; }
      .tab-btn { padding: 10px 0; font-size: 15px; }
      .mins-picker { grid-template-columns: repeat(4, 1fr); gap: 6px; }
      .min-btn { height: 48px; font-size: 15px; }
      .drum-scroll { height: 54px; }
      .drum-item { height: 54px; font-size: 21px; }
      .drum-sep { font-size: 21px; padding-bottom: 8px; }
      .drum-confirm-btn { height: 54px; padding: 0 11px; font-size: 13px; }
      .log-section { margin: 8px 14px 24px; border-radius: 16px; padding: 14px 16px; }
      .log-title { font-size: 11px; margin-bottom: 8px; }
      .log-item { font-size: 13px; padding: 7px 0; gap: 8px; }
      .log-dot { width: 7px; height: 7px; }
      .log-delta { font-size: 14px; }
      .log-ts { font-size: 11px; }
      .empty-log { font-size: 13px; padding: 12px 0; }
      .toast { font-size: 14px; padding: 10px 22px; }
    }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>🎮 Game Time Bank</h1>
    <p>ゆうわ ×1.2倍 ／ ゆうき ×1.5倍（毎日自動・5分単位切り上げ）</p>
    <button class="reload-btn" onclick="location.reload()">🔄</button>
  </div>
  <div class="bonus-applied" id="bonus-banner"></div>
  <div class="cards-grid">

    <!-- ゆうわ -->
    <div class="kid-card yuwa">
      <div class="card-bg-icon">⭐</div>
      <div class="kid-name">ゆうわ</div>
      <div class="kid-multiplier">毎晩 ×1.2</div><br>
      <div class="kid-stats">
        <div class="stat-block">
          <div class="stat-label">⏱ ゲーム時間</div>
          <span class="kid-time" id="yuwa-time">-</span><span class="kid-time-unit">分</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-block">
          <div class="stat-label">💴 お小遣い</div>
          <span class="kid-money" id="yuwa-money">-</span><span class="kid-money-unit">円</span>
        </div>
      </div>
      <div class="convert-area">
        <button class="convert-toggle-btn" id="yuwa-convert-toggle" onclick="toggleConvert('yuwa')">💴 お小遣いに変換</button>
        <div class="convert-picker" id="yuwa-convert-picker">
          <div class="convert-drum-wrap"><div class="convert-drum-label">百・十の位</div><div class="convert-drum-scroll" id="yuwa-conv-tens"></div></div>
          <div class="convert-drum-sep">:</div>
          <div class="convert-drum-wrap"><div class="convert-drum-label">一の位</div><div class="convert-drum-scroll" id="yuwa-conv-ones"></div></div>
          <button class="convert-confirm-btn" onclick="confirmConvert('yuwa')">💴変換</button>
        </div>
      </div>
      <div class="action-area">
        <div class="action-tabs">
          <button class="tab-btn add-tab" id="yuwa-add-tab" onclick="selectTab('yuwa','add')">＋ 追加</button>
          <button class="tab-btn use-tab" id="yuwa-use-tab" onclick="selectTab('yuwa','use')">▶ 使う</button>
        </div>
        <div class="mins-picker add-picker" id="yuwa-add-picker">
          <button class="min-btn" onclick="changeTime('yuwa',5,'add')">5分</button>
          <button class="min-btn" onclick="changeTime('yuwa',10,'add')">10分</button>
          <button class="min-btn" onclick="changeTime('yuwa',15,'add')">15分</button>
          <button class="min-btn" onclick="changeTime('yuwa',30,'add')">30分</button>
          <div class="drum-row">
            <div class="drum-wrap"><div class="drum-label">十の位</div><div class="drum-scroll" id="yuwa-add-tens"></div></div>
            <div class="drum-sep">:</div>
            <div class="drum-wrap"><div class="drum-label">一の位</div><div class="drum-scroll" id="yuwa-add-ones"></div></div>
            <button class="drum-confirm-btn" onclick="confirmDrum('yuwa','add')">＋追加</button>
          </div>
        </div>
        <div class="mins-picker use-picker" id="yuwa-use-picker">
          <button class="min-btn" onclick="changeTime('yuwa',15,'use')">15分</button>
          <button class="min-btn" onclick="changeTime('yuwa',30,'use')">30分</button>
          <button class="min-btn" onclick="changeTime('yuwa',45,'use')">45分</button>
          <button class="min-btn" onclick="changeTime('yuwa',60,'use')">60分</button>
          <div class="drum-row">
            <div class="drum-wrap"><div class="drum-label">十の位</div><div class="drum-scroll" id="yuwa-use-tens"></div></div>
            <div class="drum-sep">:</div>
            <div class="drum-wrap"><div class="drum-label">一の位</div><div class="drum-scroll" id="yuwa-use-ones"></div></div>
            <button class="drum-confirm-btn" onclick="confirmDrum('yuwa','use')">▶使う</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ゆうき -->
    <div class="kid-card yuuki">
      <div class="card-bg-icon">🌟</div>
      <div class="kid-name">ゆうき</div>
      <div class="kid-multiplier">毎晩 ×1.5</div><br>
      <div class="kid-stats">
        <div class="stat-block">
          <div class="stat-label">⏱ ゲーム時間</div>
          <span class="kid-time" id="yuuki-time">-</span><span class="kid-time-unit">分</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-block">
          <div class="stat-label">💴 お小遣い</div>
          <span class="kid-money" id="yuuki-money">-</span><span class="kid-money-unit">円</span>
        </div>
      </div>
      <div class="convert-area">
        <button class="convert-toggle-btn" id="yuuki-convert-toggle" onclick="toggleConvert('yuuki')">💴 お小遣いに変換</button>
        <div class="convert-picker" id="yuuki-convert-picker">
          <div class="convert-drum-wrap"><div class="convert-drum-label">百・十の位</div><div class="convert-drum-scroll" id="yuuki-conv-tens"></div></div>
          <div class="convert-drum-sep">:</div>
          <div class="convert-drum-wrap"><div class="convert-drum-label">一の位</div><div class="convert-drum-scroll" id="yuuki-conv-ones"></div></div>
          <button class="convert-confirm-btn" onclick="confirmConvert('yuuki')">💴変換</button>
        </div>
      </div>
      <div class="action-area">
        <div class="action-tabs">
          <button class="tab-btn add-tab" id="yuuki-add-tab" onclick="selectTab('yuuki','add')">＋ 追加</button>
          <button class="tab-btn use-tab" id="yuuki-use-tab" onclick="selectTab('yuuki','use')">▶ 使う</button>
        </div>
        <div class="mins-picker add-picker" id="yuuki-add-picker">
          <button class="min-btn" onclick="changeTime('yuuki',5,'add')">5分</button>
          <button class="min-btn" onclick="changeTime('yuuki',10,'add')">10分</button>
          <button class="min-btn" onclick="changeTime('yuuki',15,'add')">15分</button>
          <button class="min-btn" onclick="changeTime('yuuki',30,'add')">30分</button>
          <div class="drum-row">
            <div class="drum-wrap"><div class="drum-label">十の位</div><div class="drum-scroll" id="yuuki-add-tens"></div></div>
            <div class="drum-sep">:</div>
            <div class="drum-wrap"><div class="drum-label">一の位</div><div class="drum-scroll" id="yuuki-add-ones"></div></div>
            <button class="drum-confirm-btn" onclick="confirmDrum('yuuki','add')">＋追加</button>
          </div>
        </div>
        <div class="mins-picker use-picker" id="yuuki-use-picker">
          <button class="min-btn" onclick="changeTime('yuuki',15,'use')">15分</button>
          <button class="min-btn" onclick="changeTime('yuuki',30,'use')">30分</button>
          <button class="min-btn" onclick="changeTime('yuuki',45,'use')">45分</button>
          <button class="min-btn" onclick="changeTime('yuuki',60,'use')">60分</button>
          <div class="drum-row">
            <div class="drum-wrap"><div class="drum-label">十の位</div><div class="drum-scroll" id="yuuki-use-tens"></div></div>
            <div class="drum-sep">:</div>
            <div class="drum-wrap"><div class="drum-label">一の位</div><div class="drum-scroll" id="yuuki-use-ones"></div></div>
            <button class="drum-confirm-btn" onclick="confirmDrum('yuuki','use')">▶使う</button>
          </div>
        </div>
      </div>
    </div>

  </div>
  <div class="log-section">
    <div class="log-title">📋 履歴</div>
    <div id="log-list"><div class="empty-log">読み込み中...</div></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="sync-status syncing" id="sync-status">⏳ 接続中...</div>

<script>
  const DB = 'https://game-time-bank-default-rtdb.asia-southeast1.firebasedatabase.app';
  const MAX_MINS = 560;
  const KEEP_MINS = 60;

  let state = { yuwa:0, yuuki:0, yuwa_money:0, yuuki_money:0, log:[], lastOpenedDate:todayStr(), activeTab:{yuwa:null,yuuki:null} };
  let loaded = false;

  function ceilTo5(m){ return Math.ceil(m/5)*5; }
  function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  function daysBetween(a,b){ return Math.floor((new Date(b)-new Date(a))/86400000); }
  function nowTs(){ const n=new Date(); return (n.getMonth()+1)+'/'+n.getDate()+' '+String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0'); }

  function setSyncStatus(s){
    const el=document.getElementById('sync-status');
    el.className='sync-status '+s;
    el.textContent=s==='ok'?'✅ 同期済み':s==='syncing'?'⏳ 同期中...':'❌ 接続エラー';
  }

  async function loadFromDB(){
    try {
      const r = await fetch(DB+'/.json');
      const data = await r.json();
      if(data){
        state.yuwa = data.yuwa||0;
        state.yuuki = data.yuuki||0;
        state.yuwa_money = data.yuwa_money||0;
        state.yuuki_money = data.yuuki_money||0;
        state.log = data.log||[];
        state.lastOpenedDate = data.lastOpenedDate||todayStr();
        state.activeTab = data.activeTab||{yuwa:null,yuuki:null};
      }
      loaded = true;
      applyMissedDays();
      render();
      setSyncStatus('ok');
    } catch(e){ setSyncStatus('err'); render(); }
  }

  async function saveToDB(){
    setSyncStatus('syncing');
    try {
      await fetch(DB+'/.json', { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(state) });
      setSyncStatus('ok');
    } catch(e){ setSyncStatus('err'); }
  }

  function startStream(){
    const es = new EventSource(DB+'/.json?accept=text/event-stream');
    es.addEventListener('put', e => {
      try {
        const d = JSON.parse(e.data);
        if(d.data){
          const s = d.data;
          state.yuwa = s.yuwa||0;
          state.yuuki = s.yuuki||0;
          state.yuwa_money = s.yuwa_money||0;
          state.yuuki_money = s.yuuki_money||0;
          state.log = s.log||[];
          state.lastOpenedDate = s.lastOpenedDate||todayStr();
          if(loaded) render();
        }
      } catch(err){}
    });
    es.onerror = () => setSyncStatus('err');
  }

  // 変換ドラムロール
  function initConvertDrum(id, max){
    const el=document.getElementById(id); if(!el)return;
    let h=''; for(let i=0;i<=max;i++) h+='<div class="drum-item">'+i+'</div>';
    el.innerHTML=h;
  }
  function getConvertDrumValue(id){
    const el=document.getElementById(id); if(!el)return 0;
    const ih=el.querySelector('.drum-item')?el.querySelector('.drum-item').offsetHeight:62;
    return Math.round(el.scrollTop/ih);
  }
  function toggleConvert(kid){
    const picker=document.getElementById(kid+'-convert-picker');
    const btn=document.getElementById(kid+'-convert-toggle');
    const isVisible=picker.classList.contains('visible');
    picker.classList.toggle('visible',!isVisible);
    btn.classList.toggle('active',!isVisible);
    if(!isVisible){ initConvertDrum(kid+'-conv-tens',99); initConvertDrum(kid+'-conv-ones',9); }
  }
  function confirmConvert(kid){
    const tens=getConvertDrumValue(kid+'-conv-tens');
    const ones=getConvertDrumValue(kid+'-conv-ones');
    const mins=tens*10+ones;
    if(mins<=0){ showToast('0より大きい時間を選んでください'); return; }
    if(mins>state[kid]){ showToast('時間が足りません！（残り'+state[kid]+'分）'); return; }
    state[kid]-=mins;
    state[kid+'_money']=(state[kid+'_money']||0)+mins;
    state.log.push({kid,label:'💴 お小遣い変換',delta:-mins,ts:nowTs(),type:'convert',yen:mins});
    if(state.log.length>100) state.log.shift();
    showToast((kid==='yuwa'?'ゆうわ':'ゆうき')+' '+mins+'分 → '+mins+'円 💴');
    document.getElementById(kid+'-convert-picker').classList.remove('visible');
    document.getElementById(kid+'-convert-toggle').classList.remove('active');
    saveToDB(); render();
  }

  // 強制変換（複利後に560分超えたら60分残して変換）
  function autoConvertIfOver(kid){
    if(state[kid] > MAX_MINS){
      const convertMins = state[kid] - KEEP_MINS;
      state[kid] = KEEP_MINS;
      state[kid+'_money'] = (state[kid+'_money']||0) + convertMins;
      state.log.push({ kid, label:'🔁 上限超過→お小遣い変換', delta:-convertMins, ts:nowTs(), type:'auto_convert', yen:convertMins });
      return convertMins;
    }
    return 0;
  }

  function applyMissedDays(){
    const today=todayStr(), days=daysBetween(state.lastOpenedDate,today);
    if(days<=0) return;
    const py=state.yuwa, pk=state.yuuki;
    for(let i=0;i<days;i++){
      state.yuwa=ceilTo5(state.yuwa*1.2);
      state.yuuki=ceilTo5(state.yuuki*1.5);
    }
    const dy=state.yuwa-py, dk=state.yuuki-pk, ts=nowTs();
    if(dy>0) state.log.push({kid:'yuwa',label:'🌙 複利×1.2 ('+days+'日分)',delta:dy,ts});
    if(dk>0) state.log.push({kid:'yuuki',label:'🌙 複利×1.5 ('+days+'日分)',delta:dk,ts});

    // 複利後に上限チェック→強制変換
    const cy = autoConvertIfOver('yuwa');
    const ck = autoConvertIfOver('yuuki');

    if(state.log.length>100) state.log=state.log.slice(-100);
    state.lastOpenedDate=today;
    saveToDB();

    // バナー表示
    let msg = '🌙 '+days+'日分の複利ボーナス！ゆうわ +'+dy+'分 ／ ゆうき +'+dk+'分';
    if(cy>0||ck>0) msg += '　💴 上限超過：';
    if(cy>0) msg += 'ゆうわ '+cy+'円';
    if(ck>0) msg += ' ゆうき '+ck+'円';
    const b=document.getElementById('bonus-banner');
    b.textContent=msg;
    b.classList.add('show'); setTimeout(()=>b.classList.remove('show'),6000);
  }

  function saveToDB_debounced(){
    clearTimeout(saveToDB_debounced._t);
    saveToDB_debounced._t = setTimeout(saveToDB, 300);
  }

  function render(){
    document.getElementById('yuwa-time').textContent=state.yuwa;
    document.getElementById('yuuki-time').textContent=state.yuuki;
    document.getElementById('yuwa-money').textContent=state.yuwa_money||0;
    document.getElementById('yuuki-money').textContent=state.yuuki_money||0;
    const el=document.getElementById('log-list');
    if(!state.log||!state.log.length){el.innerHTML='<div class="empty-log">まだ記録がありません</div>';return;}
    el.innerHTML=[...state.log].reverse().slice(0,14).map(l=>{
      const name=l.kid==='yuwa'?'ゆうわ':'ゆうき';
      const isConvert=l.type==='convert'||l.type==='auto_convert';
      const deltaClass=isConvert?'yen':l.delta>=0?'plus':'minus';
      const deltaText=isConvert?'+'+l.yen+'円':((l.delta>=0?'+':'')+l.delta+'分');
      return '<div class="log-item"><div class="log-dot '+(isConvert?'money':l.kid)+'"></div><div class="log-text">'+name+' '+l.label+'</div><div class="log-delta '+deltaClass+'">'+deltaText+'</div><div class="log-ts">'+l.ts+'</div></div>';
    }).join('');
  }

  function initDrum(id,max){
    const el=document.getElementById(id); if(!el)return;
    let h=''; for(let i=0;i<=max;i++) h+='<div class="drum-item">'+i+'</div>';
    el.innerHTML=h;
  }
  function getDrumValue(id){
    const el=document.getElementById(id); if(!el)return 0;
    const ih=el.querySelector('.drum-item')?el.querySelector('.drum-item').offsetHeight:62;
    return Math.round(el.scrollTop/ih);
  }
  function confirmDrum(kid,type){
    const mins=getDrumValue(kid+'-'+type+'-tens')*10+getDrumValue(kid+'-'+type+'-ones');
    if(mins<=0){showToast('0より大きい数を選んでください');return;}
    changeTime(kid,mins,type);
  }
  ['yuwa','yuuki'].forEach(k=>['add','use'].forEach(t=>{initDrum(k+'-'+t+'-tens',9);initDrum(k+'-'+t+'-ones',9);}));

  function selectTab(kid,tab){
    state.activeTab[kid]=state.activeTab[kid]===tab?null:tab;
    ['add','use'].forEach(t=>{
      document.getElementById(kid+'-'+t+'-tab').classList.toggle('active',state.activeTab[kid]===t);
      document.getElementById(kid+'-'+t+'-picker').classList.toggle('visible',state.activeTab[kid]===t);
    });
  }

  function changeTime(kid,mins,type){
    if(type==='use'){
      if(state[kid]<mins){showToast('時間が足りません！');return;}
      state[kid]-=mins; state.log.push({kid,label:'ゲーム',delta:-mins,ts:nowTs()});
      showToast((kid==='yuwa'?'ゆうわ':'ゆうき')+' −'+mins+'分 🎮');
    } else {
      state[kid]+=mins; state.log.push({kid,label:'追加',delta:mins,ts:nowTs()});
      showToast((kid==='yuwa'?'ゆうわ':'ゆうき')+' +'+mins+'分 ⭐');
    }
    if(state.log.length>100) state.log.shift();
    saveToDB(); render();
  }

  function showToast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2500);
  }

  loadFromDB();
  startStream();
</script>
</body>
</html>
