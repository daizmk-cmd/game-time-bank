<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>гӮІгғјгғ жҷӮй–“гғҗгғігӮҜ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: #f4f3ff;
      min-height: 100vh;
      padding: 16px;
    }
    #app { max-width: 480px; margin: 0 auto; }

    .header { text-align: center; padding: 20px 0 22px; }
    .header h1 { font-size: 26px; font-weight: 900; color: #2d2d4e; }
    .header p { font-size: 12px; color: #888; font-weight: 700; margin-top: 4px; }

    .bonus-applied {
      display: none;
      background: #f0fdf4;
      border: 1.5px solid #86efac;
      border-radius: 14px;
      padding: 12px 16px;
      margin-bottom: 14px;
      text-align: center;
      font-size: 14px;
      font-weight: 800;
      color: #166534;
      animation: fadeIn 0.4s ease;
    }
    .bonus-applied.show { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

    .kid-card {
      border-radius: 22px;
      padding: 22px 20px 18px;
      margin-bottom: 14px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    }
    .kid-card.yuwa { background: linear-gradient(135deg, #667eea, #764ba2); }
    .kid-card.yuuki { background: linear-gradient(135deg, #f093fb, #f5576c); }
    .card-bg-icon {
      position: absolute; right: -10px; top: -10px;
      font-size: 80px; opacity: 0.1; pointer-events: none;
    }

    .kid-name { font-size: 16px; font-weight: 900; color: rgba(255,255,255,0.85); margin-bottom: 4px; }
    .kid-multiplier {
      font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.65);
      background: rgba(255,255,255,0.18); display: inline-block;
      padding: 2px 9px; border-radius: 20px; margin-bottom: 14px;
    }
    .kid-time { font-size: 56px; font-weight: 900; color: #fff; line-height: 1; letter-spacing: -2px; }
    .kid-time-unit { font-size: 18px; font-weight: 700; color: rgba(255,255,255,0.75); margin-left: 4px; }

    .action-area { margin-top: 18px; }
    .action-tabs { display: flex; gap: 6px; margin-bottom: 10px; }
    .tab-btn {
      flex: 1; border: none; border-radius: 12px; padding: 10px 0;
      font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 900;
      cursor: pointer; transition: all 0.15s;
    }
    .add-tab { background: rgba(255,255,255,0.22); color: #fff; }
    .use-tab { background: rgba(0,0,0,0.22); color: #fff; }
    .add-tab.active { background: #fff; color: #764ba2; }
    .use-tab.active { background: rgba(0,0,0,0.52); color: #fff; }

    .mins-picker { display: none; grid-template-columns: repeat(4, 1fr); gap: 7px; }
    .mins-picker.visible { display: grid; }
    .min-btn {
      border: none; border-radius: 10px; padding: 11px 0;
      font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 900;
      cursor: pointer; transition: transform 0.1s;
    }
    .min-btn:active { transform: scale(0.91); }
    .add-picker .min-btn { background: rgba(255,255,255,0.88); color: #444; }
    .use-picker .min-btn { background: rgba(0,0,0,0.32); color: #fff; }

    .log-section {
      background: #fff; border-radius: 18px; padding: 16px 18px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    .log-title {
      font-size: 11px; font-weight: 900; color: #aaa;
      text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px;
    }
    .log-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 0; border-bottom: 0.5px solid #f0f0f0;
      font-size: 13px;
    }
    .log-item:last-child { border-bottom: none; padding-bottom: 0; }
    .log-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .log-dot.yuwa { background: #764ba2; }
    .log-dot.yuuki { background: #f5576c; }
    .log-text { flex: 1; color: #333; font-weight: 700; }
    .log-delta { font-weight: 900; }
    .log-delta.plus { color: #22c55e; }
    .log-delta.minus { color: #ef4444; }
    .log-ts { font-size: 11px; color: #bbb; font-weight: 700; }
    .empty-log { text-align: center; padding: 14px 0; color: #ccc; font-size: 13px; font-weight: 700; }

    .toast {
      position: fixed; top: 18px; left: 50%;
      transform: translateX(-50%) translateY(-70px);
      background: #2d2d4e; color: #fff;
      padding: 11px 24px; border-radius: 999px;
      font-size: 14px; font-weight: 800;
      transition: transform 0.3s ease; z-index: 999;
      white-space: nowrap; pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>рҹҺ® гӮІгғјгғ жҷӮй–“гғҗгғігӮҜ</h1>
    <p>гӮҶгҒҶгӮҸ Г—1.2еҖҚ пјҸ гӮҶгҒҶгҒҚ Г—1.5еҖҚпјҲжҜҺж—ҘиҮӘеӢ•пјү</p>
  </div>

  <div class="bonus-applied" id="bonus-banner"></div>

  <div class="kid-card yuwa">
    <div class="card-bg-icon">вӯҗ</div>
    <div class="kid-name">гӮҶгҒҶгӮҸ</div>
    <div class="kid-multiplier">жҜҺжҷ© Г—1.2</div><br>
    <span class="kid-time" id="yuwa-time">0</span><span class="kid-time-unit">еҲҶ</span>
    <div class="action-area">
      <div class="action-tabs">
        <button class="tab-btn add-tab" id="yuwa-add-tab" onclick="selectTab('yuwa','add')">пјӢ иҝҪеҠ </button>
        <button class="tab-btn use-tab" id="yuwa-use-tab" onclick="selectTab('yuwa','use')">в–¶ дҪҝгҒҶ</button>
      </div>
      <div class="mins-picker add-picker" id="yuwa-add-picker">
        <button class="min-btn" onclick="changeTime('yuwa',15,'add')">15еҲҶ</button>
        <button class="min-btn" onclick="changeTime('yuwa',30,'add')">30еҲҶ</button>
        <button class="min-btn" onclick="changeTime('yuwa',45,'add')">45еҲҶ</button>
        <button class="min-btn" onclick="changeTime('yuwa',60,'add')">60еҲҶ</button>
      </div>
      <div class="mins-picker use-picker" id="yuwa-use-picker">
        <button class="min-btn" onclick="changeTime('yuwa',15,'use')">15еҲҶ</button>
        <button class="min-btn" onclick="changeTime('yuwa',30,'use')">30еҲҶ</button>
        <button class="min-btn" onclick="changeTime('yuwa',45,'use')">45еҲҶ</button>
        <button class="min-btn" onclick="changeTime('yuwa',60,'use')">60еҲҶ</button>
      </div>
    </div>
  </div>

  <div class="kid-card yuuki">
    <div class="card-bg-icon">рҹҢҹ</div>
    <div class="kid-name">гӮҶгҒҶгҒҚ</div>
    <div class="kid-multiplier">жҜҺжҷ© Г—1.5</div><br>
    <span class="kid-time" id="yuuki-time">0</span><span class="kid-time-unit">еҲҶ</span>
    <div class="action-area">
      <div class="action-tabs">
        <button class="tab-btn add-tab" id="yuuki-add-tab" onclick="selectTab('yuuki','add')">пјӢ иҝҪеҠ </button>
        <button class="tab-btn use-tab" id="yuuki-use-tab" onclick="selectTab('yuuki','use')">в–¶ дҪҝгҒҶ</button>
      </div>
      <div class="mins-picker add-picker" id="yuuki-add-picker">
        <button class="min-btn" onclick="changeTime('yuuki',15,'add')">15еҲҶ</button>
        <button class="min-btn" onclick="changeTime('yuuki',30,'add')">30еҲҶ</button>
        <button class="min-btn" onclick="changeTime('yuuki',45,'add')">45еҲҶ</button>
        <button class="min-btn" onclick="changeTime('yuuki',60,'add')">60еҲҶ</button>
      </div>
      <div class="mins-picker use-picker" id="yuuki-use-picker">
        <button class="min-btn" onclick="changeTime('yuuki',15,'use')">15еҲҶ</button>
        <button class="min-btn" onclick="changeTime('yuuki',30,'use')">30еҲҶ</button>
        <button class="min-btn" onclick="changeTime('yuuki',45,'use')">45еҲҶ</button>
        <button class="min-btn" onclick="changeTime('yuuki',60,'use')">60еҲҶ</button>
      </div>
    </div>
  </div>

  <div class="log-section">
    <div class="log-title">рҹ“Ӣ еұҘжӯҙ</div>
    <div id="log-list"><div class="empty-log">гҒҫгҒ иЁҳйҢІгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const KEY = 'gamebank_v3';

  function defaultState() {
    return {
      yuwa: 0,
      yuuki: 0,
      log: [],
      lastOpenedDate: todayStr(),
      activeTab: { yuwa: null, yuuki: null }
    };
  }

  function todayStr() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function daysBetween(a, b) {
    const da = new Date(a), db = new Date(b);
    return Math.floor((db - da) / 86400000);
  }

  let state = JSON.parse(localStorage.getItem(KEY) || 'null') || defaultState();
  if (!state.activeTab) state.activeTab = { yuwa: null, yuuki: null };
  if (!state.lastOpenedDate) state.lastOpenedDate = todayStr();

  function applyMissedDays() {
    const today = todayStr();
    const days = daysBetween(state.lastOpenedDate, today);
    if (days <= 0) return;
    const prevYuwa = state.yuwa;
    const prevYuuki = state.yuuki;
    for (let i = 0; i < days; i++) {
      state.yuwa = Math.round(state.yuwa * 1.2);
      state.yuuki = Math.round(state.yuuki * 1.5);
    }
    const dy = state.yuwa - prevYuwa;
    const dk = state.yuuki - prevYuuki;
    const ts = nowTs();
    if (dy > 0) state.log.push({ kid: 'yuwa', label: 'рҹҢҷ иӨҮеҲ©Г—1.2 (' + days + 'ж—ҘеҲҶ)', delta: dy, ts });
    if (dk > 0) state.log.push({ kid: 'yuuki', label: 'рҹҢҷ иӨҮеҲ©Г—1.5 (' + days + 'ж—ҘеҲҶ)', delta: dk, ts });
    state.lastOpenedDate = today;
    save();
    const banner = document.getElementById('bonus-banner');
    banner.textContent = 'рҹҢҷ ' + days + 'ж—ҘеҲҶгҒ®иӨҮеҲ©гғңгғјгғҠгӮ№пјҒгӮҶгҒҶгӮҸ +' + dy + 'еҲҶ пјҸ гӮҶгҒҶгҒҚ +' + dk + 'еҲҶ';
    banner.classList.add('show');
    setTimeout(() => banner.classList.remove('show'), 5000);
  }

  function save() { localStorage.setItem(KEY, JSON.stringify(state)); }

  function nowTs() {
    const now = new Date();
    return (now.getMonth()+1) + '/' + now.getDate() + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  }

  function render() {
    document.getElementById('yuwa-time').textContent = state.yuwa;
    document.getElementById('yuuki-time').textContent = state.yuuki;
    const logEl = document.getElementById('log-list');
    if (!state.log.length) {
      logEl.innerHTML = '<div class="empty-log">гҒҫгҒ иЁҳйҢІгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“</div>';
      return;
    }
    logEl.innerHTML = [...state.log].reverse().slice(0, 14).map(l => `
      <div class="log-item">
        <div class="log-dot ${l.kid}"></div>
        <div class="log-text">${l.kid === 'yuwa' ? 'гӮҶгҒҶгӮҸ' : 'гӮҶгҒҶгҒҚ'} ${l.label}</div>
        <div class="log-delta ${l.delta >= 0 ? 'plus' : 'minus'}">${l.delta >= 0 ? '+' : ''}${l.delta}еҲҶ</div>
        <div class="log-ts">${l.ts}</div>
      </div>
    `).join('');
  }

  function selectTab(kid, tab) {
    state.activeTab[kid] = state.activeTab[kid] === tab ? null : tab;
    ['add','use'].forEach(t => {
      document.getElementById(kid+'-'+t+'-tab').classList.toggle('active', state.activeTab[kid] === t);
      document.getElementById(kid+'-'+t+'-picker').classList.toggle('visible', state.activeTab[kid] === t);
    });
  }

  function changeTime(kid, mins, type) {
    if (type === 'use') {
      if (state[kid] < mins) { showToast('жҷӮй–“гҒҢи¶ігӮҠгҒҫгҒӣгӮ“пјҒ'); return; }
      state[kid] -= mins;
      state.log.push({ kid, label: 'гӮІгғјгғ ', delta: -mins, ts: nowTs() });
      showToast((kid==='yuwa'?'гӮҶгҒҶгӮҸ':'гӮҶгҒҶгҒҚ') + ' вҲ’' + mins + 'еҲҶ рҹҺ®');
    } else {
      state[kid] += mins;
      state.log.push({ kid, label: 'иҝҪеҠ ', delta: mins, ts: nowTs() });
      showToast((kid==='yuwa'?'гӮҶгҒҶгӮҸ':'гӮҶгҒҶгҒҚ') + ' +' + mins + 'еҲҶ вӯҗ');
    }
    if (state.log.length > 100) state.log.shift();
    save();
    render();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  applyMissedDays();
  render();
</script>
</body>
</html>
